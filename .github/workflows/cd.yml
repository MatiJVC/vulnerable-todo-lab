name: CD

on:
  workflow_run:
    workflows:
      - "CI"
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: "npm"

      - run: npm ci

      - name: Build application
        run: npm run build

      - name: Package production build
        run: |
          mkdir -p artifacts
          cp -R .next package.json package-lock.json public artifacts || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-production-artifact
          path: artifacts
